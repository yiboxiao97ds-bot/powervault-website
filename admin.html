<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PowerVault 后台管理</title>
<style>
:root{--bg:#0a0c0f;--surface:#111318;--surface2:#181c23;--border:rgba(255,255,255,0.08);--accent:#00e5a0;--accent2:#0066ff;--text:#f0f2f5;--muted:#8b949e;--danger:#ef4444;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'PingFang SC','Noto Sans SC',sans-serif;min-height:100vh;}

/* 登录页 */
.login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:48px 40px;width:100%;max-width:400px;position:relative;overflow:hidden;}
.login-box::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent2),var(--accent));}
.login-logo{font-size:22px;font-weight:700;margin-bottom:8px;}
.login-logo span{color:var(--accent);}
.login-sub{font-size:13px;color:var(--muted);margin-bottom:36px;}
.login-label{font-size:12px;color:var(--muted);margin-bottom:6px;display:block;}
.login-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:11px 14px;font-size:14px;color:var(--text);outline:none;margin-bottom:20px;font-family:inherit;transition:border-color 0.2s;}
.login-input:focus{border-color:rgba(0,229,160,0.5);}
.login-btn{width:100%;background:var(--accent);color:#000;border:none;padding:13px;border-radius:9px;font-size:15px;font-weight:700;cursor:pointer;transition:opacity 0.2s;}
.login-btn:hover{opacity:0.85;}
.login-err{color:var(--danger);font-size:13px;margin-top:12px;text-align:center;display:none;}

/* 后台主界面 */
.admin-page{display:none;}
.admin-nav{background:var(--surface);border-bottom:1px solid var(--border);padding:0 5%;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:99;}
.admin-logo{font-size:17px;font-weight:700;}
.admin-logo span{color:var(--accent);}
.admin-logo small{font-size:11px;color:var(--muted);margin-left:8px;font-weight:400;}
.logout-btn{background:transparent;border:1px solid var(--border);color:var(--muted);padding:6px 16px;border-radius:7px;font-size:13px;cursor:pointer;transition:all 0.2s;}
.logout-btn:hover{border-color:var(--danger);color:var(--danger);}

.admin-body{padding:40px 5%;max-width:900px;margin:0 auto;}

.section-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px;margin-bottom:24px;}
.section-card h3{font-size:15px;font-weight:600;margin-bottom:20px;padding-bottom:12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}
.section-card h3 .icon{font-size:18px;}

.field{margin-bottom:16px;}
.field label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px;letter-spacing:0.3px;}
.field input,.field textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px 13px;font-size:13px;color:var(--text);outline:none;font-family:inherit;transition:border-color 0.2s;}
.field input:focus,.field textarea:focus{border-color:rgba(0,229,160,0.5);}
.field textarea{resize:none;height:80px;line-height:1.6;}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}

.save-btn{background:var(--accent);color:#000;border:none;padding:11px 28px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;transition:opacity 0.2s;}
.save-btn:hover{opacity:0.85;}
.save-btn:disabled{opacity:0.5;cursor:not-allowed;}

.preview-btn{background:transparent;border:1px solid var(--border);color:var(--text);padding:11px 28px;border-radius:8px;font-size:14px;cursor:pointer;margin-left:12px;transition:all 0.2s;}
.preview-btn:hover{border-color:rgba(255,255,255,0.3);}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--accent);color:#000;font-size:13px;font-weight:600;padding:10px 24px;border-radius:100px;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:999;}
.toast.show{opacity:1;}

.metrics-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
.metric-input-box{background:var(--surface2);border-radius:10px;padding:14px;}
.metric-input-box label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;display:block;}
.metric-input-box input{width:100%;background:transparent;border:none;border-bottom:1px solid var(--border);padding:4px 0;font-size:18px;font-weight:700;color:var(--accent);outline:none;font-family:inherit;}

@media(max-width:600px){.field-row,.metrics-grid{grid-template-columns:1fr;}.admin-body{padding:20px 4%;}}
</style>
</head>
<body>

<!-- 登录页 -->
<div class="login-page" id="loginPage">
  <div class="login-box">
    <div class="login-logo">Power<span>Vault</span></div>
    <div class="login-sub">后台管理系统 · 请输入密码登录</div>
    <label class="login-label">管理员密码</label>
    <input type="password" class="login-input" id="pwdInput" placeholder="请输入密码" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">登录后台</button>
    <div class="login-err" id="loginErr">密码错误，请重试</div>
  </div>
</div>

<!-- 后台主界面 -->
<div class="admin-page" id="adminPage">
  <div class="admin-nav">
    <div class="admin-logo">Power<span>Vault</span> <small>后台管理</small></div>
    <button class="logout-btn" onclick="doLogout()">退出登录</button>
  </div>

  <div class="admin-body">

    <!-- 基本信息 -->
    <div class="section-card">
      <h3><span class="icon">🏷️</span>品牌 & 基本信息</h3>
      <div class="field-row">
        <div class="field"><label>品牌名称</label><input id="f_brand" value="PowerVault"></div>
        <div class="field"><label>产品名称</label><input id="f_product" value="10 kWh 储能柜"></div>
      </div>
      <div class="field"><label>顶部标语（Badge）</label><input id="f_badge" value="全新第三代磷酸铁锂电芯"></div>
    </div>

    <!-- 主标题 -->
    <div class="section-card">
      <h3><span class="icon">✏️</span>首页主标题</h3>
      <div class="field-row">
        <div class="field"><label>第一行</label><input id="f_h1a" value="智能储能，"></div>
        <div class="field"><label>高亮文字（绿色）</label><input id="f_h1b" value="掌控能源"></div>
      </div>
      <div class="field"><label>第三行</label><input id="f_h1c" value="自由用电"></div>
      <div class="field"><label>副标题描述</label><textarea id="f_desc">PowerVault 家用储能系统，峰谷套利、光伏并储、断电备用三合一。一块电池，让您的家庭能源自主自立。</textarea></div>
    </div>

    <!-- 关键数据 -->
    <div class="section-card">
      <h3><span class="icon">📊</span>关键数据展示</h3>
      <div class="metrics-grid">
        <div class="metric-input-box">
          <label>数据1数值</label>
          <input id="f_m1v" value="10+">
          <input id="f_m1l" style="font-size:11px;color:var(--muted);font-weight:400;margin-top:6px;" value="可用容量（kWh）">
        </div>
        <div class="metric-input-box">
          <label>数据2数值</label>
          <input id="f_m2v" value="6000">
          <input id="f_m2l" style="font-size:11px;color:var(--muted);font-weight:400;margin-top:6px;" value="循环寿命（次）">
        </div>
        <div class="metric-input-box">
          <label>数据3数值</label>
          <input id="f_m3v" value="15">
          <input id="f_m3l" style="font-size:11px;color:var(--muted);font-weight:400;margin-top:6px;" value="质保年限（年）">
        </div>
        <div class="metric-input-box">
          <label>数据4数值</label>
          <input id="f_m4v" value="97%">
          <input id="f_m4l" style="font-size:11px;color:var(--muted);font-weight:400;margin-top:6px;" value="系统综合效率">
        </div>
      </div>
    </div>

    <!-- 联系方式 -->
    <div class="section-card">
      <h3><span class="icon">📞</span>联系方式</h3>
      <div class="field-row">
        <div class="field"><label>手机 / 电话</label><input id="f_phone" value="158-2857-8465"></div>
        <div class="field"><label>微信号</label><input id="f_wechat" value="15828578465"></div>
      </div>
      <div class="field"><label>邮箱</label><input id="f_email" value="760659558@qq.com"></div>
      <div class="field"><label>腾讯文档表单链接</label><input id="f_form" value="https://docs.qq.com/form/page/DVmx0V1VTVEVjUWtv"></div>
    </div>

    <!-- 版权 -->
    <div class="section-card">
      <h3><span class="icon">⚙️</span>其他设置</h3>
      <div class="field"><label>底部版权文字</label><input id="f_copy" value="© 2025 PowerVault 储能科技. 保留所有权利."></div>
    </div>

    <div style="display:flex;align-items:center;flex-wrap:wrap;gap:12px;margin-top:8px;">
      <button class="save-btn" onclick="saveAndGenerate()">💾 保存并生成网站</button>
      <button class="preview-btn" onclick="previewSite()">👁 预览效果</button>
      <span style="font-size:12px;color:var(--muted)">保存后下载新文件，上传到 Netlify 即可更新网站</span>
    </div>

  </div>
</div>

<div class="toast" id="toast">✅ 保存成功！文件已下载</div>

<script>
const PASSWORD = '123456zxc';

function doLogin(){
  const pwd = document.getElementById('pwdInput').value;
  if(pwd === PASSWORD){
    document.getElementById('loginPage').style.display='none';
    document.getElementById('adminPage').style.display='block';
    loadSaved();
  } else {
    document.getElementById('loginErr').style.display='block';
  }
}

function doLogout(){
  document.getElementById('adminPage').style.display='none';
  document.getElementById('loginPage').style.display='flex';
  document.getElementById('pwdInput').value='';
}

function getVals(){
  return {
    brand: document.getElementById('f_brand').value,
    product: document.getElementById('f_product').value,
    badge: document.getElementById('f_badge').value,
    h1a: document.getElementById('f_h1a').value,
    h1b: document.getElementById('f_h1b').value,
    h1c: document.getElementById('f_h1c').value,
    desc: document.getElementById('f_desc').value,
    m1v: document.getElementById('f_m1v').value,
    m1l: document.getElementById('f_m1l').value,
    m2v: document.getElementById('f_m2v').value,
    m2l: document.getElementById('f_m2l').value,
    m3v: document.getElementById('f_m3v').value,
    m3l: document.getElementById('f_m3l').value,
    m4v: document.getElementById('f_m4v').value,
    m4l: document.getElementById('f_m4l').value,
    phone: document.getElementById('f_phone').value,
    wechat: document.getElementById('f_wechat').value,
    email: document.getElementById('f_email').value,
    form: document.getElementById('f_form').value,
    copy: document.getElementById('f_copy').value,
  };
}

function loadSaved(){
  try {
    const saved = localStorage.getItem('pv_admin_data');
    if(saved){
      const d = JSON.parse(saved);
      Object.keys(d).forEach(k=>{
        const el = document.getElementById('f_'+k);
        if(el) el.value = d[k];
      });
    }
  } catch(e){}
}

function buildSiteHTML(v){
  return `<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<title>${v.brand} — 家用储能系统</title>
<style>

nav{position:sticky;top:0;background:rgba(10,12,15,0.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 5%;height:62px;z-index:100;}
.nav-logo{font-size:20px;font-weight:700;}.nav-logo span{color:var(--accent);}
.nav-links{display:flex;gap:32px;list-style:none;}
.nav-links a{color:var(--muted);text-decoration:none;font-size:14px;}

.hero{padding:80px 5% 64px;position:relative;overflow:hidden;display:grid;grid-template-columns:1fr 1fr;gap:48px;align-items:center;}
.hero-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(0,229,160,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,160,0.04) 1px,transparent 1px);background-size:48px 48px;mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 40%,transparent 100%);}

function saveAndGenerate(){
  const v = getVals();
  localStorage.setItem('pv_admin_data', JSON.stringify(v));
  const html = buildSiteHTML(v);
  const blob = new Blob([html], {type:'text/html'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'index.html';
  a.click();
  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}

function previewSite(){
  const v = getVals();
  const html = buildSiteHTML(v);
  const blob = new Blob([html], {type:'text/html'});
  window.open(URL.createObjectURL(blob), '_blank');
}
